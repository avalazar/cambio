<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cambio</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">

    <!-- ── Home screen ──────────────────────────────────────── -->
    <div id="home-screen" class="screen">
      <h1>Cambio</h1>
      <p class="subtitle">A card game hub for Cambio &amp; Un-Solitaire</p>

      <div id="connection-status" class="status-badge connecting">Connecting…</div>

      <div class="name-row">
        <input id="name-input" type="text" placeholder="Your name" maxlength="20" autocomplete="off" />
      </div>

      <div class="home-actions">
        <button id="create-btn" disabled>Create Room</button>
        <div class="divider">or</div>
        <div class="join-row">
          <input id="code-input" type="text" placeholder="Room code" maxlength="4" autocomplete="off" spellcheck="false" />
          <button id="join-btn" disabled>Join</button>
        </div>
      </div>

      <p id="home-error" class="error-msg hidden"></p>
    </div>

    <!-- ── Lobby screen ─────────────────────────────────────── -->
    <div id="lobby-screen" class="screen hidden">
      <div class="lobby-header">
        <h1>Lobby</h1>
        <div class="room-code-badge">
          Room <span id="room-code-display">----</span>
        </div>
      </div>

      <p id="lobby-status">Waiting for players…</p>
      <ul id="player-list"></ul>

      <div id="game-selector">
        <p class="selector-label">Game</p>
        <div class="game-options">
          <button class="game-option" data-game="cambio" type="button">
            <span class="game-name">Cambio</span>
            <span class="game-desc">Memory &amp; deception</span>
          </button>
          <button class="game-option" data-game="un-solitaire" type="button">
            <span class="game-name">Un-Solitaire</span>
            <span class="game-desc">Cooperative solitaire</span>
          </button>
        </div>
        <p id="host-note" class="host-note hidden">Only the host can change the game.</p>
      </div>

      <button id="start-btn" disabled>Start Game</button>
      <button id="leave-btn" class="secondary">Leave Lobby</button>
    </div>

    <!-- ── Game screen ───────────────────────────────────────── -->
    <div id="game-screen" class="screen hidden">

      <div class="game-top-bar">
        <button id="back-btn" class="back-btn">← Menu</button>
      </div>

      <!-- Cambio board (shown when game === 'cambio') -->
      <div id="cambio-board" class="cambio-board hidden">
        <div id="turn-indicator" class="turn-indicator"></div>
        <p id="phase-label" class="phase-label hidden"></p>

        <div id="opponents-area" class="opponents-area"></div>

        <div class="center-piles">
          <div class="pile-slot">
            <p class="pile-label">Draw</p>
            <div class="card face-down pile-card">
              <div class="card-back-inner"></div>
            </div>
            <p id="draw-pile-count" class="pile-count"></p>
          </div>
          <div class="pile-slot">
            <p class="pile-label">Discard</p>
            <div id="discard-pile-card" class="pile-card-slot"></div>
          </div>
        </div>

        <div class="my-hand-area">
          <p class="hand-label">
            Your Cards
            <span class="hand-hint">bottom row peeked</span>
          </p>
          <div id="my-hand" class="card-grid-2x2"></div>
        </div>
      </div>

      <!-- Generic fallback (Un-Solitaire placeholder) -->
      <div id="generic-game-info" class="hidden">
        <h1 id="game-title">Game Starting…</h1>
        <p id="game-info"></p>
      </div>

    </div>

  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="client.js"></script>
</body>
</html>
